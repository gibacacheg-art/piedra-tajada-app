<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prueba Supabase - Piedra Tajada</title>
    <style>
      :root {
        --bg: #f6f8f7;
        --surface: #ffffff;
        --ink: #17211d;
        --muted: #66736d;
        --line: #d8e0dc;
        --accent: #2f6f4e;
        --red: #b74444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 32px, 760px);
        margin: 40px auto;
        display: grid;
        gap: 16px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 20px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      label {
        display: grid;
        gap: 7px;
        margin-bottom: 12px;
        font-weight: 700;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
        padding: 10px 12px;
      }

      input {
        border: 1px solid #cad5d0;
      }

      button {
        border: 0;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-weight: 800;
      }

      pre {
        overflow: auto;
        border-radius: 8px;
        background: #17211d;
        color: #eef4f1;
        padding: 14px;
        white-space: pre-wrap;
      }

      .muted {
        color: var(--muted);
      }

      .error {
        color: var(--red);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="muted">Piedra Tajada SpA</p>
        <h1>Prueba rápida de Supabase</h1>
        <p>Abre este archivo con doble clic para probar conexión, login y lectura básica sin levantar Next.js.</p>
      </section>

      <section>
        <h2>Login</h2>
        <label>
          Correo
          <input id="email" type="email" placeholder="tu-correo@ejemplo.cl" />
        </label>
        <label>
          Contraseña
          <input id="password" type="password" placeholder="Tu contraseña" />
        </label>
        <button id="loginButton" type="button">Probar acceso</button>
      </section>

      <section>
        <h2>Resultado</h2>
        <pre id="output">Esperando prueba...</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "https://cluryiiemnnzjqkdxzpt.supabase.co";
      const supabaseAnonKey = "sb_publishable_5c4U0xSmXYpT9MUvplqfHQ_WtOvoLVA";
      const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
      const output = document.querySelector("#output");

      function write(value) {
        output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      async function runTest() {
        write("Iniciando prueba...");

        const email = document.querySelector("#email").value.trim();
        const password = document.querySelector("#password").value;

        const { data: loginData, error: loginError } = await client.auth.signInWithPassword({ email, password });

        if (loginError) {
          write({
            ok: false,
            paso: "login",
            error: loginError.message
          });
          return;
        }

        const [profileResult, rolesResult, statusesResult, eventsResult] = await Promise.all([
          client.from("profiles").select("id, full_name, is_active").eq("id", loginData.user.id).maybeSingle(),
          client.from("roles").select("code, name").order("code"),
          client.from("event_statuses").select("code, label").order("sort_order"),
          client.from("events").select("id, event_name, status, event_date").limit(5)
        ]);

        write({
          ok: true,
          usuario: loginData.user.email,
          profile: profileResult.error ? profileResult.error.message : profileResult.data,
          roles_catalogo: rolesResult.error ? rolesResult.error.message : rolesResult.data,
          estados_evento: statusesResult.error ? statusesResult.error.message : statusesResult.data,
          eventos_visibles: eventsResult.error ? eventsResult.error.message : eventsResult.data,
          nota: "Si roles_catalogo y estados_evento aparecen con datos, Auth + RLS están funcionando."
        });
      }

      document.querySelector("#loginButton").addEventListener("click", runTest);
    </script>
  </body>
</html>
